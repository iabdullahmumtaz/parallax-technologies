<!--
  EMAILJS — PASTE INSTRUCTIONS
  1. Email Templates → open "Contact Us" → edit content (HTML).
  2. If EmailJS shows a full-page preview wrapper, paste ONLY the block between
     BEGIN EMAIL BODY and END EMAIL BODY (inclusive of the inner <table>).
  2b. Subject: New lead: {{from_name}}
  3. "To Email": your inbox (e.g. info.parallax.tech@gmail.com).
  4. Reply-To field (if available): {{reply_to}}
  Variables: {{from_name}} {{from_email}} {{company}} {{message}} {{reply_to}}
-->

<!-- BEGIN EMAIL BODY -->
<table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#030712;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <tr>

        <tr>

        </tr>
        <tr>
          <td style="background-color:#0a1228;border-radius:20px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 24px 60px rgba(0,0,0,0.45);overflow:hidden;">
            <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
              <tr>
                <td style="height:4px;background:linear-gradient(90deg,#3164d3 0%,#4f8dff 50%,#79d8a5 100%);"></td>

                  <p style="margin:0;font-size:14px;line-height:1.5;color:#94a3b8;">Someone submitted the contact form on your site.</p>
                </td>
              </tr>
              <tr>
                <td style="padding:16px 28px 28px;">
                  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="border-collapse:collapse;">
                    <tr>
                      <td style="padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06);">
                        <p style="margin:0 0 4px;font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:#64748b;font-weight:600;">Name</p>
                        <p style="margin:0;font-size:16px;color:#f4f6fb;font-weight:600;">{{from_name}}</p>
                      </td>
                    </tr>
                    <tr>
                      <td style="padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.06);">

                    </tr>
                    <tr>
